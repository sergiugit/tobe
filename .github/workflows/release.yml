name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev \
            libavformat-dev libavcodec-dev libavdevice-dev \
            libavutil-dev libswscale-dev libswresample-dev \
            libpulse-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libssl-dev libayatana-appindicator3-dev \
            patchelf file

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build AppImage
        run: cargo tauri build --bundles appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Fix .DirIcon symlink in AppImage
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          APPDIR=src-tauri/target/release/bundle/appimage/Tobe.AppDir

          # Fix the .DirIcon symlink from absolute to relative
          if [ -L "$APPDIR/.DirIcon" ]; then
            TARGET=$(readlink "$APPDIR/.DirIcon")
            BASENAME=$(basename "$TARGET")
            if [ "$TARGET" != "$BASENAME" ]; then
              rm "$APPDIR/.DirIcon"
              ln -s "$BASENAME" "$APPDIR/.DirIcon"
              echo "Fixed .DirIcon: $TARGET -> $BASENAME"
            fi
          fi

          # Also set categories if missing
          DESKTOP_FILE=$(ls "$APPDIR"/*.desktop 2>/dev/null | head -1)
          if [ -n "$DESKTOP_FILE" ] && ! grep -q "^Categories=" "$DESKTOP_FILE"; then
            echo "Categories=AudioVideo;Network;" >> "$DESKTOP_FILE"
            echo "Fixed missing Categories in desktop file"
          fi

          # Rebuild AppImage from fixed AppDir
          if command -v appimagetool &>/dev/null; then
            appimagetool --no-appstream "$APPDIR" "$APPIMAGE"
          else
            # Download appimagetool if not available
            wget -q -O /tmp/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x /tmp/appimagetool
            /tmp/appimagetool --no-appstream "$APPDIR" "$APPIMAGE"
          fi
          echo "Repacked: $(ls -lh $APPIMAGE)"

      - name: Upload AppImage as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Tobe ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            "$APPIMAGE"
