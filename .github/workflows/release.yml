name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev \
            libavformat-dev libavcodec-dev libavdevice-dev \
            libavutil-dev libswscale-dev libswresample-dev \
            libpulse-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libssl-dev libayatana-appindicator3-dev \
            patchelf file

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build AppImage
        run: cargo tauri build --bundles appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload AppImage as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Tobe ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            "$APPIMAGE"
