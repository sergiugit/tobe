app-id: com.tobe.app
# Uses Freedesktop runtime (not GNOME) — no GNOME dependency,
# works on any desktop. WebKitGTK provided via SDK extension.
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.webkitgtk-6.0
command: tobe

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --socket=pulseaudio

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/tobe/cargo
    PKG_CONFIG_PATH: /usr/lib/sdk/webkitgtk-6.0/lib/pkgconfig

modules:
  - name: tobe
    buildsystem: simple
    build-commands:
      - cargo fetch --manifest-path src-tauri/Cargo.toml
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      - cp src-tauri/target/release/tobe .
      - install -Dm755 tobe /app/bin/tobe
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.tobe.app.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.tobe.app.png
      - install -Dm644 com.tobe.app.desktop /app/share/applications/com.tobe.app.desktop
      - install -Dm644 com.tobe.app.appdata.xml /app/share/metainfo/com.tobe.app.appdata.xml
    sources:
      - type: dir
        path: .
    cleanup:
      - /cargo
      - /lib/.build-id
